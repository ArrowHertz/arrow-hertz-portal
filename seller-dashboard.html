<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Dashboard - Arrow Hertz</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020617;
color:white;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
color:#38bdf8;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>

</head>

<body>

<header>
Arrow Hertz Seller Dashboard
</header>

<div class="container">

<div class="card">
<h3>Add Spare Part</h3>

<input type="text" placeholder="Product Name">

<input type="text" placeholder="Brand">

<input type="number" placeholder="Price">

<input type="number" placeholder="Stock Quantity">

<button>Add Product</button>

</div>

<div class="card">
<h3>Your Orders</h3>
<p>No orders yet</p>
</div>

</div>

</body>
</html>
