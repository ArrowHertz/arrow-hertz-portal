<title>Arrow Hertz Products</title>

<style>

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:8px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

button{
padding:8px 15px;
background:#38bdf8;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>

</head>

<body>

<header>
Arrow Hertz Marketplace
</header>

<input 
id="search" 
placeholder="Search products..." 
onkeyup="searchProduct()"
style="padding:10px;width:80%;margin:20px;">

<div class="container">

<h2>Available Products</h2>

<div id="productList" class="grid"></div>

</div>

<script>
  
if(localStorage.getItem("customerLogin")!="true"){
alert("Please login first");
window.location.href="customer-login.html";
}
let products = JSON.parse(localStorage.getItem("products")) || [];

let container=document.getElementById("productList");

products.forEach(function(p){

let card=document.createElement("div");

card.className="card";

card.innerHTML = `
<img src="${p.image}">
<h3>${p.name}</h3>
<p>Price : ₹${p.price}</p>
<p>Stock : ${p.stock}</p>
<button onclick="orderProduct('${p.name}')">Order</button>
`;
<img src="${p.image}" style="width:100%;height:150px;object-fit:cover">

container.appendChild(card);

});

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(function(card){

let text=card.innerText.toLowerCase();

if(text.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}
  
function orderProduct(name){

let cname = prompt("Enter Your Name");
let caddress = prompt("Enter Delivery Address");

if(!cname || !caddress){
alert("Order cancelled");
return;
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
product:name,
customer:cname,
address:caddress,
status:"New Order"
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("Order placed successfully");

}

</script>

</body>
