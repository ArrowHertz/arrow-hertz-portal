<!DOCTYPE html>
<html>
<head>
<title>My Orders - Arrow Hertz</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
color:#38bdf8;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
My Orders
</header>

<div class="container">

<div id="orderList"></div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let container=document.getElementById("orderList");

orders.forEach(function(o){

let card=document.createElement("div");

card.className="card";

card.innerHTML = `
<h3>${o.product}</h3>
<p>Status : ${o.status}</p>
<p>Delivery Address : ${o.address}</p>
`;

container.appendChild(card);

});

</script>

</body>
</html>
