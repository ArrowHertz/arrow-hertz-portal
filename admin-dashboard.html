<title>Admin Dashboard - Arrow Hertz</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
color:#38bdf8;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
Arrow Hertz Admin Panel
</header>

<div class="container">

<div class="card">
<h3>All Products</h3>
<ul id="productList"></ul>
</div>

<div class="card">
<h3>All Orders</h3>
<ul id="orderList"></ul>
</div>

</div>

<script>

/* products load */

let products = JSON.parse(localStorage.getItem("products")) || [];

let plist=document.getElementById("productList");

products.forEach(function(p){

let li=document.createElement("li");

li.innerHTML = `
${p.name} | ₹${p.price} | Stock: ${p.stock}

<button onclick="deleteProduct(${index})">
Delete
</button>
`;

plist.appendChild(li);

});

/* orders load */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let olist=document.getElementById("orderList");

orders.forEach(function(o){

let li=document.createElement("li");

li.innerHTML = o.product + " | Status: " + o.status;

olist.appendChild(li);

});
  
function deleteProduct(i){

let products = JSON.parse(localStorage.getItem("products")) || [];

products.splice(i,1);

localStorage.setItem("products",JSON.stringify(products));

location.reload();

}
</script>

</body>
