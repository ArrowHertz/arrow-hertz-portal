<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Dashboard - Arrow Hertz</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020617;
color:white;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
color:#38bdf8;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>

</head>

<body>

<header>
Arrow Hertz Seller Dashboard
</header>
<div style="text-align:center;padding:10px;background:#0f172a">

<a href="seller-dashboard.html">
<button>Dashboard</button>
</a>

<a href="add-product.html">
<button>Add Product Page</button>
</a>

<a href="products.html">
<button>Products Page</button>
</a>

<a href="orders.html">
<button>Orders Page</button>
</a>

</div>
<div class="container">

<div class="card">
<h3>Add Spare Part</h3>

<input id="pname" type="text" placeholder="Product Name">

<input id="brand" type="text" placeholder="Brand">

<input id="price" type="number" placeholder="Price">

<input id="stock" type="number" placeholder="Stock Quantity">

<button onclick="addProduct()">Add Product</button>

<h3>Product List</h3>
<ul id="productList"></ul>
  
</div>

<div class="card">
<h3>Your Orders</h3>
<p>No orders yet</p>
</div>

</div>
<script>

function addProduct(){

let name=document.getElementById("pname").value;
let brand=document.getElementById("brand").value;
let price=document.getElementById("price").value;
let stock=document.getElementById("stock").value;

let list=document.getElementById("productList");

let item=document.createElement("li");

item.innerHTML = name + " | " + brand + " | ₹" + price + " | Stock: " + stock;

list.appendChild(item);

/* inputs clear after adding product */

document.getElementById("pname").value="";
document.getElementById("brand").value="";
document.getElementById("price").value="";
document.getElementById("stock").value="";

}

</script>
</body>
</html>
