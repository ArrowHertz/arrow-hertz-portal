<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - Arrow Hertz</title>

<style>

body{
font-family:Arial;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

h2{
color:#facc15;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#facc15;
border:none;
border-radius:5px;
color:black;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#eab308;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" placeholder="Admin ID">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
